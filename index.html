<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gyokoi Hub — Control Center</title>
  <meta name="description" content="Gyokoi's personal control center for every website, workspace and system.">
  <meta name="theme-color" content="#0b1020">

  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=1">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon.png?v=1">
  <link rel="apple-touch-icon" href="favicon.png?v=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <script src="apps.js" defer></script>
  <script src="script.js" defer></script>
</head>

<body>
  <div class="wallpaper" aria-hidden="true">
    <div class="aurora aurora-one"></div>
    <div class="aurora aurora-two"></div>
    <div class="aurora aurora-three"></div>
    <div class="noise"></div>
  </div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">G</span>
      <div>
        <strong>GYOKOI</strong>
        <small>Control Center</small>
      </div>
    </div>

    <div class="topbar-actions">
      <button class="spotlight-button" type="button" data-open-search>
        <span>⌘ K</span>
        Search
      </button>

      <button class="theme-button" type="button" data-toggle-theme aria-label="Toggle theme">
        ◐
      </button>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">MISSION CONTROL</p>
        <h1>Everything I build,<br><span>one place.</span></h1>
        <p class="hero-copy">
          A personal launcher for websites, workspaces, systems and ideas.
        </p>
      </div>

      <div class="hero-meta">
        <div>
          <span id="currentTime">--:--</span>
          <small id="currentDate">Loading date…</small>
        </div>
        <div>
          <strong id="appCount">0</strong>
          <small>active destinations</small>
        </div>
      </div>
    </section>

    <section class="mission-grid" aria-label="App categories">
      <button class="mission-card active" type="button" data-filter="all">
        <span class="mission-icon">✦</span>
        <span>
          <strong>All Apps</strong>
          <small>Everything in one view</small>
        </span>
      </button>

      <button class="mission-card" type="button" data-filter="personal">
        <span class="mission-icon">⌘</span>
        <span>
          <strong>Personal</strong>
          <small>Brand & AI workspace</small>
        </span>
      </button>

      <button class="mission-card" type="button" data-filter="work">
        <span class="mission-icon">◫</span>
        <span>
          <strong>Work</strong>
          <small>Tools & operations</small>
        </span>
      </button>

      <button class="mission-card" type="button" data-filter="business">
        <span class="mission-icon">◇</span>
        <span>
          <strong>Business</strong>
          <small>Family & owned projects</small>
        </span>
      </button>

      <button class="mission-card" type="button" data-filter="internal">
        <span class="mission-icon">⌁</span>
        <span>
          <strong>Internal</strong>
          <small>Private access points</small>
        </span>
      </button>
    </section>

    <section class="launchpad">
      <div class="section-head">
        <div>
          <p class="eyebrow">LAUNCHPAD</p>
          <h2 id="sectionTitle">All Apps</h2>
        </div>

        <label class="inline-search">
          <span aria-hidden="true">⌕</span>
          <input id="inlineSearch" type="search" placeholder="Search apps…">
        </label>
      </div>

      <div class="app-grid" id="appGrid"></div>
    </section>
  </main>

  <nav class="dock" aria-label="Quick launch">
    <button type="button" data-dock="portfolio" title="Portfolio">P</button>
    <button type="button" data-dock="alicejens" title="AliceJens">A</button>
    <button type="button" data-dock="workspace" title="Workspace">W</button>
    <button type="button" data-dock="kk" title="K&K">K</button>
    <button type="button" data-open-search title="Search">⌕</button>
  </nav>

  <dialog class="spotlight" id="spotlight">
    <div class="spotlight-panel">
      <div class="spotlight-input-wrap">
        <span>⌕</span>
        <input id="spotlightInput" type="search" placeholder="Search anything…">
        <kbd>Esc</kbd>
      </div>
      <div class="spotlight-results" id="spotlightResults"></div>
    </div>
  </dialog>

  <template id="appCardTemplate">
    <article class="app-card">
      <div class="app-card-top">
        <div class="app-icon"></div>
        <span class="status-badge"></span>
      </div>
      <div class="app-copy">
        <span class="app-category"></span>
        <h3 class="app-title"></h3>
        <p class="app-description"></p>
      </div>
      <div class="app-actions">
        <a class="open-app" target="_blank" rel="noopener noreferrer">Open</a>
        <a class="secondary-link" target="_blank" rel="noopener noreferrer" hidden>Admin</a>
      </div>
    </article>
  </template>
</body>
</html>
